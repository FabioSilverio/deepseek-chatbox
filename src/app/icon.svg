<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="body" x1="4" y1="8" x2="28" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="tail" x1="20" y1="8" x2="30" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Whale body: tapered teardrop, head on left, tail joint on right -->
  <path d="M 13 9 C 6 9 4 13 4 16 C 4 19 6 23 13 23 C 18 23 22 20.5 22 16 C 22 11.5 18 9 13 9 Z" fill="url(#body)"/>

  <!-- Dorsal fin -->
  <path d="M 14 9 C 15 6.5 19 6 19.5 9" fill="url(#body)" opacity="0.85"/>

  <!-- Tail: forked, pointing right -->
  <path d="M 22 16 C 24 14.5 27 11 28 10 C 26.5 13 26 14.5 26 16 C 26 17.5 26.5 19 28 22 C 27 21 24 17.5 22 16 Z" fill="url(#tail)"/>

  <!-- Eye: dark with small highlight -->
  <circle cx="11" cy="14.5" r="1.8" fill="#0a0a14"/>
  <circle cx="11.6" cy="13.9" r="0.6" fill="rgba(255,255,255,0.4)"/>

  <!-- Mouth curve -->
  <path d="M 5.5 17.5 Q 7 19.5 9 18.5" stroke="rgba(255,255,255,0.2)" stroke-width="0.8" stroke-linecap="round" fill="none"/>
</svg>
